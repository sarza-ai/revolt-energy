<?xml version="1.0" encoding="UTF-8"?>
<!-- High-contrast black + green favicon: slanted battery + bolt -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ReVolt">
  <!-- Solid black tile -->
  <rect width="64" height="64" rx="12" fill="#000000"/>

  <!-- Slanted battery -->
  <g transform="translate(32 32) rotate(-32) translate(-32 -32)">
    <!-- Battery body outline (thick bright green) -->
    <rect
      x="17"
      y="15"
      width="30"
      height="38"
      rx="5"
      stroke="#22c55e"
      stroke-width="4"
      fill="#000000"
    />
    <!-- Terminal -->
    <rect x="26" y="9" width="12" height="7" rx="2" fill="#22c55e"/>
    <!-- Fill level hint -->
    <rect x="22" y="36" width="20" height="12" rx="2" fill="#166534"/>
    <!-- Charging bolt (bold, high contrast) -->
    <path
      d="M36 20 L26.5 34 H33 L29.5 48 L42 31 H34.5 L36 20 Z"
      fill="#4ade80"
    />
  </g>
</svg>
