<?xml version="1.0" encoding="UTF-8"?>
<!-- ReVolt Energy lockup: original logo structure + site theme colors -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none" role="img" aria-label="ReVolt Energy">
