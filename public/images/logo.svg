    <rect x="23" y="20" width="18" height="26" rx="2.5" stroke="#ecfdf5" stroke-width="2.4" fill="none"/>
    <rect x="28.5" y="16" width="7" height="4" rx="1.2" fill="#ecfdf5"/>
    <path
